<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGPA Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    color:white;
}

.container{
    width:90%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:3rem;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:0.8;
    margin-bottom:30px;
}

.student-info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

.header-row{
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:15px;
    margin-bottom:10px;
    font-weight:600;
    opacity:0.9;
}

.input-row{
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:15px;
    margin-bottom:15px;
}

input,select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:0.95rem;
}

input::placeholder{
    color:rgba(255,255,255,0.65);
}

select option{
    color:black;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:25px;
}

button{
    border:none;
    border-radius:30px;
    padding:14px 30px;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
}

.add-btn{
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
}

.calc-btn{
    background:linear-gradient(135deg,#f7971e,#ffd200);
    color:black;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(8px);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
}

.overlay.active{
    opacity:1;
    pointer-events:auto;
}

.popup{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:35px;
    text-align:center;
    transform:scale(0.85);
    transition:0.4s;
}

.overlay.active .popup{
    transform:scale(1);
}

.result-name{
    font-size:1.7rem;
    margin-bottom:10px;
}

.sgpa-value{
    font-size:3rem;
    font-weight:bold;
    color:#ffd54f;
    margin:15px 0;
}

.result-details{
    line-height:1.9;
    font-size:1rem;
}

.badge{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    font-weight:600;
}

.close-btn{
    margin-top:25px;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    color:white;
}

@media(max-width:700px){

.student-info,
.header-row,
.input-row{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="container" id="mainContent">

<h1>SGPA Calculator</h1>
<div class="subtitle">Developed by Subhayu</div>

<div class="student-info">
    <input type="text" id="studentName" placeholder="Enter Student Name">

    <select id="semester">
        <option value="">Select Semester</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
        <option>8</option>
    </select>
</div>

<div class="header-row">
    <div>Subject Name</div>
    <div>Credits</div>
    <div>Grade</div>
</div>

<div id="inputs">

    <div class="input-row">
        <input type="text" placeholder="Enter Subject Name">

        <input type="number" placeholder="Credits" min="0">

        <select>
            <option value="">Select Grade</option>
            <option value="10">A+ (10)</option>
            <option value="9">A (9)</option>
            <option value="8">B+ (8)</option>
            <option value="7">B (7)</option>
            <option value="6">C+ (6)</option>
            <option value="5">C (5)</option>
            <option value="4">D (4)</option>
            <option value="0">E</option>
            <option value="0">F</option>
            <option value="0">I</option>
        </select>
    </div>

</div>

<div class="buttons">
    <button class="add-btn" onclick="addRow()">Add Subject</button>
    <button class="calc-btn" onclick="calculateSGPA()">Calculate SGPA</button>
</div>

</div>

<div class="overlay" id="overlay">

<div class="popup">

<div class="result-name" id="resultName"></div>

<div class="sgpa-value" id="sgpaValue"></div>

<div class="result-details" id="resultDetails"></div>

<div class="badge" id="performanceBadge"></div>

<button class="close-btn" onclick="closePopup()">
Close
</button>

</div>

</div>

<script>

function addRow(){

    const row=document.createElement("div");

    row.className="input-row";

    row.innerHTML=`

    <input type="text" placeholder="Enter Subject Name">

    <input type="number" placeholder="Credits" min="0">

    <select>
        <option value="">Select Grade</option>
        <option value="10">A+ (10)</option>
        <option value="9">A (9)</option>
        <option value="8">B+ (8)</option>
        <option value="7">B (7)</option>
        <option value="6">C+ (6)</option>
        <option value="5">C (5)</option>
        <option value="4">D (4)</option>
        <option value="0">E</option>
        <option value="0">F</option>
        <option value="0">I</option>
    </select>

    `;

    document.getElementById("inputs").appendChild(row);
}

function calculateSGPA(){

    const name=document.getElementById("studentName").value.trim();

    const semester=document.getElementById("semester").value;

    if(!name || !semester){
        alert("Please enter Student Name and Semester.");
        return;
    }

    const rows=document.querySelectorAll(".input-row");

    let totalCredits=0;
    let weightedSum=0;

    let highestGrade=-1;
    let bestSubjects=[];

    let failedSubjects=[];

    rows.forEach(row=>{

        const subject=row.children[0].value.trim() || "Unnamed Subject";

        const credit=parseFloat(row.children[1].value);

        const grade=parseFloat(row.children[2].value);

        if(!isNaN(credit) && !isNaN(grade)){

            totalCredits+=credit;
            weightedSum+=credit*grade;

            if(grade>highestGrade){
                highestGrade=grade;
                bestSubjects=[subject];
            }
            else if(grade===highestGrade){
                bestSubjects.push(subject);
            }

            if(grade===0){
                failedSubjects.push(subject);
            }
        }

    });

    if(totalCredits===0){
        alert("Please enter valid subject details.");
        return;
    }

    const sgpa=(weightedSum/totalCredits).toFixed(2);

    let performance="";

    if(sgpa>=9)
        performance="Outstanding 🌟";
    else if(sgpa>=8)
        performance="Excellent 🎉";
    else if(sgpa>=7)
        performance="Very Good 👍";
    else if(sgpa>=6)
        performance="Good";
    else
        performance="Needs Improvement";

    document.getElementById("resultName").innerHTML=
        `${name}<br>Semester ${semester}`;

    document.getElementById("sgpaValue").textContent=sgpa;

    document.getElementById("resultDetails").innerHTML=
    `
    <strong>Total Credits:</strong> ${totalCredits}<br>

    <strong>Total Grade Points:</strong>
    ${weightedSum.toFixed(0)}<br><br>

    <strong>Best Subject(s):</strong><br>
    ${bestSubjects.join(", ")}<br><br>

    ${
        failedSubjects.length
        ?
        `<strong>Failed Subject(s):</strong><br>
        ${failedSubjects.join(", ")}`
        :
        `<strong>No Backlogs 🎯</strong>`
    }
    `;

    document.getElementById("performanceBadge").textContent=
        performance;

    document.getElementById("overlay")
        .classList.add("active");

    document.getElementById("mainContent")
        .style.filter="blur(6px)";
}

function closePopup(){

    document.getElementById("overlay")
        .classList.remove("active");

    document.getElementById("mainContent")
        .style.filter="none";
}

</script>

</body>
</html>
